<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#08090d">
  <meta name="description" content="inzi.at is under construction. Soon.">
  <title>inzi.at - Under construction</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="signal-field" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>
  <main class="site-shell" aria-label="Under construction">
    <section class="status-panel">
      <div class="terminal-line" aria-hidden="true">
        <span class="prompt">root@inzi</span>
        <span class="path">~/build</span>
        <span class="command">deploy --quiet</span>
      </div>

      <h1>Under construction</h1>
      <p class="soon">soon<span class="caret" aria-hidden="true"></span></p>

      <div class="readout" aria-hidden="true">
        <span>eta unknown</span>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('signal-field');
    const ctx = canvas.getContext('2d');
    const glyphs = ['0', '1', '{', '}', '<', '/', '>', '_', '#', '$', '*', '+', '~'];
    const mouse = { x: -9999, y: -9999 };
    let particles = [];
    let width = 0;
    let height = 0;
    let dpr = 1;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(42, Math.floor((width * height) / 14500));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.32,
        vy: (Math.random() - 0.5) * 0.32,
        glyph: glyphs[Math.floor(Math.random() * glyphs.length)],
        pulse: Math.random() * Math.PI * 2
      }));
    }

    function draw(time = 0) {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(8, 9, 13, 0.5)';
      ctx.fillRect(0, 0, width, height);

      const t = time * 0.001;
      ctx.font = '12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (const p of particles) {
        if (!prefersReducedMotion) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -20) p.x = width + 20;
          if (p.x > width + 20) p.x = -20;
          if (p.y < -20) p.y = height + 20;
          if (p.y > height + 20) p.y = -20;
        }

        const glow = 0.26 + Math.sin(t * 2 + p.pulse) * 0.12;
        ctx.fillStyle = `rgba(125, 255, 209, ${glow})`;
        ctx.fillText(p.glyph, p.x, p.y);
      }

      ctx.lineWidth = 1;
      for (let i = 0; i < particles.length; i += 1) {
        for (let j = i + 1; j < particles.length; j += 1) {
          const a = particles[i];
          const b = particles[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const distance = Math.hypot(dx, dy);

          if (distance < 118) {
            const alpha = (1 - distance / 118) * 0.16;
            ctx.strokeStyle = `rgba(67, 199, 255, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }

        const p = particles[i];
        const md = Math.hypot(p.x - mouse.x, p.y - mouse.y);
        if (md < 190) {
          ctx.strokeStyle = `rgba(255, 181, 71, ${(1 - md / 190) * 0.28})`;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.stroke();
        }
      }

      if (!prefersReducedMotion) requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('pointermove', (event) => {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
    });
    window.addEventListener('pointerleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    resize();
    draw();
  </script>
</body>
</html>
