<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tobiinzi</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/portfolio.css">
  <link rel="stylesheet" href="styles/intro.css">
  <script src="scripts/intro.js" defer></script>
</head>
<body class="landing-page">
  <div class="intro" id="intro" aria-hidden="false">
    <canvas class="particle-field" id="particleField"></canvas>
    <div class="color-wash" aria-hidden="true"></div>
    <button class="main-title" id="mainTitle" type="button">
      <span class="main-title-text" id="mainTitleText"></span>
      <span class="main-title-subtext" id="mainTitleSubtext"></span>
    </button>
    <button class="intro-hit-target" id="introHitTarget" type="button" aria-label="Open site"></button>
  </div>

  <main class="portfolio" aria-live="polite">
    <div class="arrival-loader">
      <h1 class="arrival-tip" id="arrivalTip">this is my website</h1>
      <span class="arrival-spinner" aria-hidden="true">
        <span class="arrival-ring"></span>
        <img class="arrival-drop" src="assets/droplet-solid-full.svg" alt="">
      </span>
    </div>
    <p class="construction-text">This website is under construction</p>
  </main>
</body>
</html>
